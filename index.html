<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chiara & The Shadows</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/animations.css"/>
  <link rel="stylesheet" href="styles/battle.css"/>
  <link rel="stylesheet" href="styles/ui.css"/>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="app">
    <div id="scene-container"></div>
    <div id="overlay"></div>
    <div id="dialogue-box" class="hidden">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
    </div>
    <div id="progress-bar">
      <div class="progress-dot" data-index="0"></div>
      <div class="progress-dot" data-index="1"></div>
      <div class="progress-dot" data-index="2"></div>
      <div class="progress-dot" data-index="3"></div>
      <div class="progress-dot" data-index="4"></div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
