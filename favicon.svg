<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 12 18" width="32" height="32">
  <title>Chiara</title>
  <defs>
    <radialGradient id="aura" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="rgb(242,167,187)" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="rgb(242,167,187)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Soft glow (matches battle canvas aura) -->
  <ellipse cx="4" cy="9" rx="5.5" ry="7" fill="url(#aura)"/>
  <!-- Hair -->
  <rect x="-1" y="0" width="10" height="1" fill="#b894c8"/>
  <rect x="0" y="1" width="8" height="1" fill="#b894c8"/>
  <rect x="-1" y="1" width="2" height="5" fill="#c9a7d4"/>
  <rect x="7" y="1" width="2" height="5" fill="#c9a7d4"/>
  <rect x="0" y="0" width="8" height="2" fill="#c9a7d4"/>
  <!-- Head -->
  <rect x="1" y="2" width="6" height="5" fill="#f2c4d0"/>
  <!-- Eyes (idle, open) -->
  <rect x="2" y="3" width="1" height="2" fill="#3b1f2e"/>
  <rect x="5" y="3" width="1" height="2" fill="#3b1f2e"/>
  <!-- Blush -->
  <rect x="1" y="5" width="1" height="1" fill="#f2a7bb" fill-opacity="0.7"/>
  <rect x="6" y="5" width="1" height="1" fill="#f2a7bb" fill-opacity="0.7"/>
  <!-- Torso / dress -->
  <rect x="1" y="7" width="6" height="4" fill="#f2a7bb"/>
  <rect x="2" y="7" width="2" height="2" fill="#ffc0d0"/>
  <rect x="0" y="8" width="8" height="3" fill="#e8a0b8"/>
  <!-- Arms -->
  <rect x="-2" y="7" width="2" height="4" fill="#f2c4d0"/>
  <rect x="8" y="7" width="2" height="4" fill="#f2c4d0"/>
  <!-- Skirt -->
  <rect x="-1" y="10" width="10" height="2" fill="#e8a0b8"/>
  <rect x="-1" y="12" width="2" height="2" fill="#e8a0b8"/>
  <rect x="7" y="12" width="2" height="2" fill="#e8a0b8"/>
  <!-- Legs & shoes -->
  <rect x="1" y="13" width="3" height="4" fill="#c9a7d4"/>
  <rect x="4" y="13" width="3" height="4" fill="#c9a7d4"/>
  <rect x="1" y="17" width="3" height="1" fill="#7c5c90"/>
  <rect x="4" y="17" width="3" height="1" fill="#7c5c90"/>
</svg>
